<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dingus Games | Premium Gaming</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --highlight: #818cf8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        /* Navigation */
        .top-bar {
            background-color: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            color: white;
            text-align: center;
            padding: 20px;
            font-size: 24px;
            font-weight: 800;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .container {
            max-width: 1100px;
            margin: 100px auto 50px;
            padding: 20px;
            text-align: center;
        }

        /* Store View Components */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }

        .game-card {
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 20px;
        }

        .game-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .game-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .section-box {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 40px;
            margin-top: 60px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Shared Buttons & Inputs */
        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
            text-transform: uppercase;
        }

        .btn:hover { background-color: var(--primary-hover); }
        .btn-secondary { background-color: #334155; margin-top: 10px; }

        input[type="text"] {
            background: #0f172a;
            border: 1px solid #334155;
            padding: 12px;
            border-radius: 8px;
            color: white;
            width: 100%;
            max-width: 300px;
            margin-bottom: 15px;
            outline: none;
            box-sizing: border-box;
        }

        /* Checkout View */
        #checkout-view {
            display: none;
            justify-content: center;
            align-items: center;
            padding-top: 50px;
        }

        .checkout-box {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            max-width: 450px;
            width: 100%;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .highlight { color: var(--highlight); font-weight: 800; }

        /* Helpers */
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="top-bar" id="nav-title">DINGUS GAMES</div>

    <div id="store-view" class="container">
        <div class="game-grid">
            <div class="game-card">
                <img src="game1.png" alt="Fartnite" class="game-img">
                <h2>Fartnite PLUS Fork Knife</h2>
                <button class="btn" onclick="alert('Buy button does nothing')">Buy Now • $60</button>
            </div>

            <div class="game-card">
                <img src="game2.png" alt="Epic Obby" class="game-img">
                <h2>Epic Obby!</h2>
                <button class="btn" onclick="openCheckout('Epic Obby!', '$0.00', 'https://drive.google.com/drive/folders/1E0Djyfss5Mjya-x3y2Iq5QOzMhRXw5t-?usp=drive_link', 'Fill Out The Info (not required):')">Claim Free</button>
            </div>

            <div class="game-card">
                <img src="game3.png" alt="Empty Trail" class="game-img">
                <h2>Walk An Empty Trail Simulator!</h2>
                <button class="btn" onclick="openCheckout('Walk an empty trail simulator!', '$0.00', 'https://drive.google.com/drive/folders/1mUbUpUi70PCKNHbh-jo5oUV4VGdqvl_l?usp=sharing', 'idk put something here')">Claim Free</button>
            </div>

            <div class="game-card">
                <img src="game4.png" alt="Miku Horror" class="game-img">
                <h2>Miku's Epic Horror Game!</h2>
                <button class="btn" onclick="openCheckout('Miku\'s Epic Horror Game!', '$0.00', 'https://drive.google.com/drive/folders/1Qkf5In3gWI_CqKojzwJf0kqGBRWnKppj?usp=drive_link', 'idk put anything')">Claim Free</button>
            </div>

            <div class="game-card">
                <img src="game5.png" alt="Miku Hallway" class="game-img">
                <h2>Miku's Hallway</h2>
                <button class="btn" onclick="openCheckout('Miku\'s Hallway', '$0.00', 'https://drive.google.com/drive/folders/1AWRWCJMS82-cdDyjn28TqMfVrR23R4k9?usp=drive_link', 'idk put anything')">Claim Free</button>
            </div>
        </div>

        <div class="section-box">
            <h2>Redeem Code</h2>
            <input type="text" id="codeInput" placeholder="XXXX-XXXX-XXXX">
            <br>
            <button class="btn" onclick="redeemCode()">Redeem Code</button>
            <br>
            <button class="btn btn-secondary" onclick="openCheckout('?????????????????', '$null.null', 'https://drive.google.com/file/d/1I8oyxAiYFtrsQ-5rzD6wfXPrkrrXiLDR/view?usp=drive_link', '?????????????', true)">???</button>
        </div>
    </div>

    <div id="checkout-view" class="container">
        <div class="checkout-box">
            <h2 id="checkout-header">You're Buying: <span id="game-name" class="highlight"></span></h2>
            <p><strong>Total:</strong> <span id="game-price"></span></p>
            <p id="checkout-desc" style="color: var(--text-muted)"></p>

            <input type="text" placeholder="put anything here">
            <input type="text" placeholder="put anything here">
            <input type="text" placeholder="put anything here">

            <button class="btn" id="complete-btn" style="width: 100%">Complete Purchase</button>
            <button class="btn btn-secondary" onclick="showStore()" style="width: 100%">Back to Store</button>
        </div>
    </div>

    <script>
        function openCheckout(name, price, link, desc, isSecret = false) {
            document.getElementById('store-view').classList.add('hidden');
            document.getElementById('checkout-view').style.display = 'flex';
            
            document.getElementById('game-name').innerText = name;
            document.getElementById('game-price').innerText = price;
            document.getElementById('checkout-desc').innerText = desc;
            
            const nav = document.getElementById('nav-title');
            const header = document.getElementById('checkout-header');
            
            if (isSecret) {
                nav.innerText = "??????????????";
                header.innerHTML = `????????: <span class="highlight">${name}</span>`;
            } else {
                nav.innerText = "DINGUS GAMES CHECKOUT";
                header.innerHTML = `You're Buying: <span class="highlight">${name}</span>`;
            }

            document.getElementById('complete-btn').onclick = function() {
                window.location.href = link;
            };
            window.scrollTo(0,0);
        }

        function showStore() {
            document.getElementById('store-view').classList.remove('hidden');
            document.getElementById('checkout-view').style.display = 'none';
            document.getElementById('nav-title').innerText = "DINGUS GAMES";
        }

        function redeemCode() {
            const correctCode = "HDI6-H8SG-U3NV";
            const userCode = document.getElementById("codeInput").value;
            if (userCode === correctCode) {
                alert("Code Redeemed!");
            } else {
                alert("Invalid code. Please try again.");
            }
        }
    </script>
</body>
</html>
